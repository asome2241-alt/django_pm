{% extends 'base.html' %}
{% load i18n %}
{% block content %}

<div class="row justify-content-center">

    <div class="col-md-4">

        <div class="card shadow border-0">

            <div class="card-body p-4">

                <h2 class="text-center mb-4">

                    {% trans 'Register' %}

                </h2>

                <form method="post">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button
                        type="submit"
                        class="btn btn-success w-100"
                    >

                        {% trans 'Create Account' %}

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
