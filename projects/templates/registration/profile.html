{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-sm border-0">

            <div class="card-body p-4">

                <h3 class="mb-4">

                    Profile Settings

                </h3>

                <form method="post">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button
                        type="submit"
                        class="btn btn-success w-100"
                    >

                        Save Changes

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
